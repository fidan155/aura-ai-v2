services:
  # --- Reverse Proxy: einziger Eingang auf Port 80 ---
  traefik:
    image: traefik:v3.6
    container_name: aura-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # --- Datenbank ---
  postgres:
    image: postgres:15-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: pk_db
    ports:
      - "127.0.0.1:5432:5432" # nur vom Host erreichbar (für DB-Tools / Drizzle Studio), nicht extern
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pk_db"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  # --- Python-Microservice (Passwort-Checker + KI-Analyse) ---
  backend:
    build: ./backend-api
    container_name: aura-backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY muss in .env gesetzt sein}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`aura.localhost`) && PathPrefix(`/api-python`)"
      - "traefik.http.routers.backend.middlewares=backend-strip"
      - "traefik.http.middlewares.backend-strip.stripprefix.prefixes=/api-python"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  # --- Next.js Frontend ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: aura-app # getaggtes Image, wird vom studio-Dienst wiederverwendet
    container_name: aura-frontend
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}@postgres:5432/pk_db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET muss in .env gesetzt sein}
      PYTHON_API_URL: http://backend:8000
      COOKIE_SECURE: "false" # HTTP über Traefik -> kein Secure-Flag
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    # Beim Start: Tabellen anlegen, dann Server starten
    command: sh -c "npx drizzle-kit push --force && npm run start"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`aura.localhost`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # --- Drizzle Studio: visuelle DB-Oberfläche (startet automatisch mit) ---
  studio:
    image: aura-app # gleiches Image wie das Frontend (kein extra Build)
    container_name: aura-studio
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}@postgres:5432/pk_db
    command: sh -c "npx drizzle-kit studio --host 0.0.0.0 --port 4983"
    ports:
      - "127.0.0.1:4983:4983" # nur vom Host erreichbar, nicht extern
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
